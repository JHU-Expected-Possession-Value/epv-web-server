name: Deploy Frontend (Vercel) + Backend (Render)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (backend)
        run: |
          curl -s -o /dev/null -w "Render HTTP: %{http_code}\n" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Trigger Vercel deploy (frontend)
        run: |
          curl -s -o /dev/null -w "Vercel HTTP: %{http_code}\n" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
